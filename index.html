<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exhibition Guestbook | สมุดเยี่ยมชม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Anuphan', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }
        .serif-title {
            font-family: 'Playfair Display', serif;
        }
        .bg-mesh {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(147, 197, 253, 0.1) 0px, transparent 50%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        .comment-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .comment-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.08);
        }
        .input-style {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .input-style:focus {
            background: #ffffff;
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            transition: all 0.3s;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-mesh min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-12 md:py-20">
        <!-- Header -->
        <header class="text-center mb-16">
            <h1 class="serif-title text-5xl md:text-6xl font-bold text-slate-900 mb-6 italic">Gallery Guestbook</h1>
            <p class="text-slate-500 uppercase tracking-[0.3em] text-xs font-semibold">Project Exhibition & Feedback</p>
            <div class="mt-8 flex justify-center">
                <div class="h-1 w-20 bg-slate-900 rounded-full"></div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
            <!-- Left: Form Section -->
            <div class="lg:col-span-5">
                <div class="glass-card rounded-[2rem] p-8 md:p-10 sticky top-10">
                    <h2 class="text-2xl font-bold text-slate-800 mb-2 flex items-center">
                        <span class="mr-3 text-blue-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                        </span>
                        ฝากความประทับใจ
                    </h2>
                    <p class="text-slate-500 text-sm mb-8">ความคิดเห็นของคุณมีความสำคัญต่อการพัฒนาโครงงานของเรา</p>

                    <form id="commentForm" class="space-y-6">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1">ชื่อผู้เข้าชม</label>
                            <input type="text" id="userName" required 
                                class="w-full px-5 py-4 rounded-2xl input-style" 
                                placeholder="กรุณาใส่ชื่อของคุณ">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1">ข้อเสนอแนะ</label>
                            <textarea id="userComment" required rows="5" 
                                class="w-full px-5 py-4 rounded-2xl input-style resize-none" 
                                placeholder="พิมพ์ความรู้สึกหรือข้อเสนอแนะที่นี่..."></textarea>
                        </div>
                        <button type="submit" id="submitBtn"
                            class="w-full py-5 btn-primary text-white font-bold rounded-2xl shadow-xl shadow-slate-200 flex justify-center items-center">
                            <span>ส่งข้อความ</span>
                        </button>
                    </form>
                    <div id="statusMsg" class="mt-6 text-center text-sm font-medium hidden"></div>
                </div>
            </div>

            <!-- Right: Display Section -->
            <div class="lg:col-span-7">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
                    <div>
                        <h2 class="text-3xl font-bold text-slate-900">Recent Visits</h2>
                        <p id="lastUpdateLabel" class="text-slate-400 text-xs mt-1">กำลังโหลดข้อมูลล่าสุด...</p>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span id="commentCount" class="bg-slate-900 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg">0 Comments</span>
                        <button onclick="fetchComments()" class="p-3 bg-white rounded-full hover:bg-slate-50 border border-slate-100 transition-all shadow-sm group" title="Refresh">
                            <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-600 transition-transform group-active:rotate-180"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
                        </button>
                    </div>
                </div>

                <div id="commentList" class="space-y-6">
                    <!-- Loading state -->
                    <div id="skeleton" class="animate-pulse space-y-6">
                        <div class="h-32 bg-white/60 rounded-[1.5rem] border border-white"></div>
                        <div class="h-32 bg-white/60 rounded-[1.5rem] border border-white"></div>
                        <div class="h-32 bg-white/60 rounded-[1.5rem] border border-white"></div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-32 text-center">
            <p class="text-slate-400 text-sm">© 2024 Project Exhibition Guestbook. Data secured on Google Cloud.</p>
        </footer>
    </div>

    <script>
        // ใช้ URL ล่าสุดที่คุณให้มา
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzppaTQYvJBVvXZseGggdFgnK7acUHjtmVKYQHO5UjwgFVw20-0imJYW2Z9wWoQ9tZVUg/exec"; 
        
        const form = document.getElementById('commentForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMsg');
        const commentList = document.getElementById('commentList');
        const commentCountLabel = document.getElementById('commentCount');
        const lastUpdateLabel = document.getElementById('lastUpdateLabel');

        window.onload = () => {
            fetchComments();
            setInterval(fetchComments, 45000); 
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span>กำลังส่งข้อมูล...</span>`;

            const name = document.getElementById('userName').value.trim();
            const comment = document.getElementById('userComment').value.trim();
            const timestamp = new Date().toLocaleString('th-TH', { hour12: false });

            const payload = { name, comment, timestamp };

            try {
                // ส่งข้อมูลไปที่ Sheet
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                showStatus("🎉 บันทึกความเห็นของคุณเรียบร้อยแล้ว!", "text-emerald-600");
                form.reset();
                setTimeout(fetchComments, 3000); 
            } catch (error) {
                console.error('Submit Error:', error);
                showStatus("❌ ไม่สามารถบันทึกได้ กรุณาลองใหม่", "text-red-500");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = "ส่งข้อความ";
            }
        });

        async function fetchComments() {
            try {
                const response = await fetch(`${SCRIPT_URL}?t=${Date.now()}`);
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    // กรองข้อมูล: เจาะจงหาข้อมูลในคอลัมน์ B (index 1 ใน Array)
                    const validData = data.filter(item => {
                        // ลองดึงจาก Key ชื่อ 'comment' ก่อน ถ้าไม่มีให้ดึงจากตำแหน่งที่ 2 (index 1) ของ Object values
                        const values = Object.values(item);
                        const msg = item.comment || item.Comment || item.ข้อความ || values[1] || "";
                        return msg.toString().trim() !== "" && msg !== "comment"; // ไม่เอาหัวตาราง
                    });
                    
                    renderComments(validData);
                    commentCountLabel.innerText = `${validData.length} Comments`;
                    lastUpdateLabel.innerText = `อัปเดตล่าสุด: ${new Date().toLocaleTimeString('th-TH')}`;
                }
            } catch (err) {
                console.error("Fetch error:", err);
                if (commentList.innerHTML.includes('animate-pulse')) {
                    commentList.innerHTML = `<div class="glass-card p-12 rounded-[2rem] text-center"><p class="text-slate-400 text-sm">เกิดข้อผิดพลาดในการดึงข้อมูลจาก Column B</p></div>`;
                }
            }
        }

        function renderComments(comments) {
            if (!comments || comments.length === 0) {
                commentList.innerHTML = `<div class="glass-card p-12 rounded-[2rem] text-center border border-dashed"><p class="text-slate-400">ยังไม่พบข้อความในคอลัมน์ B</p></div>`;
                return;
            }

            const sorted = [...comments].reverse();
            
            commentList.innerHTML = sorted.map(item => {
                const vals = Object.values(item);
                // พยายามหา Name (มักอยู่ col A หรือ index 0) และ Comment (col B หรือ index 1)
                const name = item.name || item.Name || item.ชื่อ || vals[0] || 'Anonymous';
                const msg = item.comment || item.Comment || item.ข้อความ || vals[1] || '';
                const time = item.timestamp || item.Timestamp || vals[2] || '';
                
                return `
                <div class="glass-card p-8 rounded-[2rem] comment-item">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-2">
                        <div class="flex items-center">
                            <div class="w-10 h-10 bg-indigo-50 rounded-full flex items-center justify-center mr-3 border border-indigo-100 ring-4 ring-white shadow-inner">
                                <span class="text-indigo-600 font-bold text-xs">${String(name).substring(0,1).toUpperCase()}</span>
                            </div>
                            <span class="font-bold text-slate-800">${escapeHtml(name)}</span>
                        </div>
                        <span class="text-[10px] text-slate-400 font-bold tracking-tighter bg-white px-3 py-1 rounded-full shadow-sm">
                            ${escapeHtml(time)}
                        </span>
                    </div>
                    <div class="pl-0 sm:pl-13">
                        <p class="text-slate-600 text-lg leading-relaxed whitespace-pre-line">${escapeHtml(msg)}</p>
                    </div>
                </div>
                `;
            }).join('');
        }

        function showStatus(msg, colorClass) {
            statusMsg.innerHTML = msg;
            statusMsg.className = `mt-6 text-center text-sm font-bold ${colorClass}`;
            statusMsg.classList.remove('hidden');
            setTimeout(() => statusMsg.classList.add('hidden'), 5000);
        }

        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }
    </script>
</body>
</html>
